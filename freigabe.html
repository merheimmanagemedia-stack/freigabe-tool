<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mediaplan / Angebot freigeben</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      line-height: 1.6;
    }
    button {
      padding: 12px 20px;
      background-color: #0070f3;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0059c1;
    }
  </style>
</head>

<body>

  <h2>Freigabe bestätigen</h2>

  <p>
    Bitte bestätigen Sie die bindende Freigabe des vorliegenden Mediaplans / Angebots.
  </p>

 <button id="freigebenButton">
  Ich bestätige hiermit verbindlich die Freigabe des Mediaplans / Angebots.
</button>

<script>
  document.getElementById("freigebenButton").addEventListener("click", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const customerEmail = urlParams.get("email");

    if (!customerEmail) {
      alert("Fehler: Es wurde keine Kunden-E-Mail übergeben.");
      return;
    }

    // Optional: Kampagnendaten
    const campaignName = urlParams.get("campaign") || "Nicht angegeben";
    const budget = urlParams.get("budget") || "Nicht angegeben";

    const response = await fetch("/api/freigabe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        customerEmail,
        campaignName,
        budget
      })
    });

    if (response.ok) {
      window.location.href = "freigabe-bestaetigt.html";
    } else {
      alert("Fehler beim Versenden der Freigabe.");
    }
  });
</script>
