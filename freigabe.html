<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Freigabe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }
    button {
      padding: 14px 24px;
      background-color: #0070f3;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #0059c1;
    }
  </style>
</head>
<body>

  <h2>Freigabe</h2>
  <p>Bitte bestätigen Sie die Freigabe des Angebots / Mediaplans.</p>

  <button id="freigebenButton">
    Ich bestätige hiermit verbindlich die Freigabe des Mediaplans / Angebots.
  </button>

  <script>
    document.getElementById("freigebenButton").addEventListener("click", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const customerEmail = urlParams.get("email");
      const campaignName = urlParams.get("campaign") || "Nicht angegeben";
      const budget = urlParams.get("budget") || "Nicht angegeben";

      if (!customerEmail) {
        alert("Fehler: Keine Kunden-E-Mail übergeben.");
        return;
      }

      try {
        const response = await fetch("/api/freigabe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            customerEmail,
            campaignName,
            budget
          })
        });

        if (!response.ok) {
          throw new Error("Serverfehler");
        }

        window.location.href = "freigabe-bestaetigt.html";

      } catch (error) {
        alert("Fehler beim Versenden der Freigabe.");
      }
    });
  </script>

</body>
</html>
